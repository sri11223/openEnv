<svg xmlns="http://www.w3.org/2000/svg" width="1550" height="820" viewBox="0 0 1550 820" role="img" aria-labelledby="title desc">
  <title id="title">SENTINEL training and proof flow</title>
  <desc id="desc">A diagram showing GRPO training, reward decomposition, monitoring, adaptive curriculum, memory, held-out evaluation, and proof pack generation.</desc>
  <defs>
    <marker id="arrow" markerWidth="13" markerHeight="10" refX="11" refY="5" orient="auto">
      <path d="M0,0 L13,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font:700 34px Arial,sans-serif;fill:#111827}
      .label{font:700 16px Arial,sans-serif;fill:#111827}
      .small{font:13px Arial,sans-serif;fill:#334155}
      .tiny{font:12px Arial,sans-serif;fill:#475569}
      .box{stroke:#334155;stroke-width:2;rx:12;ry:12}
      .arrow{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .loop{stroke:#7c3aed;stroke-width:2.2;fill:none;marker-end:url(#arrow);stroke-dasharray:8 6}
    </style>
  </defs>
  <rect width="1550" height="820" fill="#f8fafc"/>
  <text x="50" y="58" class="title">Training + Proof Flow: How SENTINEL Learns and Proves It</text>
  <text x="50" y="90" class="small">The training run is not just a model checkpoint. It produces reward, stability, memory, and proof artifacts.</text>

  <rect x="55" y="150" width="190" height="100" class="box" fill="#dbeafe"/>
  <text x="150" y="184" text-anchor="middle" class="label">OpenEnv Prompt</text>
  <text x="150" y="212" text-anchor="middle" class="small">task + proposal</text>
  <text x="150" y="234" text-anchor="middle" class="small">trust + memory</text>

  <rect x="295" y="150" width="190" height="100" class="box" fill="#e0f2fe"/>
  <text x="390" y="184" text-anchor="middle" class="label">G Rollouts</text>
  <text x="390" y="212" text-anchor="middle" class="small">multiple candidate</text>
  <text x="390" y="234" text-anchor="middle" class="small">oversight decisions</text>

  <rect x="535" y="150" width="210" height="100" class="box" fill="#fecaca"/>
  <text x="640" y="184" text-anchor="middle" class="label">Environment Verifier</text>
  <text x="640" y="212" text-anchor="middle" class="small">execute safe/corrected</text>
  <text x="640" y="234" text-anchor="middle" class="small">score consequences</text>

  <rect x="795" y="130" width="250" height="140" class="box" fill="#fef3c7"/>
  <text x="920" y="164" text-anchor="middle" class="label">Decomposed Reward</text>
  <text x="920" y="194" text-anchor="middle" class="small">catch unsafe proposals</text>
  <text x="920" y="216" text-anchor="middle" class="small">avoid false positives</text>
  <text x="920" y="238" text-anchor="middle" class="small">redirect/reassign/coaching</text>
  <text x="920" y="260" text-anchor="middle" class="small">counterfactual damage</text>

  <rect x="1095" y="150" width="190" height="100" class="box" fill="#ede9fe"/>
  <text x="1190" y="184" text-anchor="middle" class="label">GRPO Update</text>
  <text x="1190" y="212" text-anchor="middle" class="small">group-relative signal</text>
  <text x="1190" y="234" text-anchor="middle" class="small">LoRA weight update</text>

  <rect x="1335" y="150" width="165" height="100" class="box" fill="#dcfce7"/>
  <text x="1417" y="184" text-anchor="middle" class="label">Better Policy</text>
  <text x="1417" y="212" text-anchor="middle" class="small">next batch uses</text>
  <text x="1417" y="234" text-anchor="middle" class="small">updated supervisor</text>

  <path class="arrow" d="M245 200 H290"/>
  <path class="arrow" d="M485 200 H530"/>
  <path class="arrow" d="M745 200 H790"/>
  <path class="arrow" d="M1045 200 H1090"/>
  <path class="arrow" d="M1285 200 H1330"/>
  <path class="loop" d="M1417 250 C1417 330,150 330,150 255"/>

  <rect x="70" y="420" width="220" height="138" class="box" fill="#ecfccb"/>
  <text x="180" y="455" text-anchor="middle" class="label">Memory Update</text>
  <text x="180" y="486" text-anchor="middle" class="small">global oversight lessons</text>
  <text x="180" y="510" text-anchor="middle" class="small">worker mistake cards</text>
  <text x="180" y="534" text-anchor="middle" class="small">evidence-required mode</text>

  <rect x="350" y="420" width="230" height="138" class="box" fill="#f1f5f9"/>
  <text x="465" y="455" text-anchor="middle" class="label">Training Monitor</text>
  <text x="465" y="486" text-anchor="middle" class="small">reward std / zero-gradient</text>
  <text x="465" y="510" text-anchor="middle" class="small">decision entropy / variety</text>
  <text x="465" y="534" text-anchor="middle" class="small">KL drift / adaptive beta</text>

  <rect x="640" y="420" width="230" height="138" class="box" fill="#fff7ed"/>
  <text x="755" y="455" text-anchor="middle" class="label">Adaptive Curriculum</text>
  <text x="755" y="486" text-anchor="middle" class="small">difficulty_low/high</text>
  <text x="755" y="510" text-anchor="middle" class="small">mastery attempts/successes</text>
  <text x="755" y="534" text-anchor="middle" class="small">frontier hit rate</text>

  <rect x="930" y="420" width="230" height="138" class="box" fill="#e0e7ff"/>
  <text x="1045" y="455" text-anchor="middle" class="label">Held-out Evaluation</text>
  <text x="1045" y="486" text-anchor="middle" class="small">scripts/eval_sentinel.py</text>
  <text x="1045" y="510" text-anchor="middle" class="small">OOD + tripwires</text>
  <text x="1045" y="534" text-anchor="middle" class="small">Top-1 vs Best-of-K</text>

  <rect x="1220" y="420" width="240" height="138" class="box" fill="#fce7f3"/>
  <text x="1340" y="455" text-anchor="middle" class="label">Proof Pack</text>
  <text x="1340" y="486" text-anchor="middle" class="small">proof_pack.py</text>
  <text x="1340" y="510" text-anchor="middle" class="small">18 dashboard images</text>
  <text x="1340" y="534" text-anchor="middle" class="small">learning snapshots 10/50/300</text>

  <path class="arrow" d="M920 270 C920 340,180 350,180 415"/>
  <path class="arrow" d="M920 270 C920 350,465 350,465 415"/>
  <path class="arrow" d="M465 558 H635"/>
  <path class="arrow" d="M870 489 H925"/>
  <path class="arrow" d="M1160 489 H1215"/>
  <path class="loop" d="M755 420 C755 355,150 355,150 255"/>

  <rect x="285" y="640" width="980" height="92" class="box" fill="#ffffff"/>
  <text x="775" y="672" text-anchor="middle" class="label">What the training proof must show</text>
  <text x="775" y="702" text-anchor="middle" class="small">not only reward went up, but damage reduced, false positives tracked, memory changed behavior, OOD/tripwires checked, and policy stayed inside KL guardrails</text>
</svg>
