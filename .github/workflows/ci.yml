name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Run OpenEnv validation
        run: python validate.py

      - name: Verify baseline scores are deterministic
        run: |
          python << 'PYEOF'
          from src.environment import IncidentResponseEnv
          from baseline.inference import run_all_tasks
          env = IncidentResponseEnv()
          r1 = run_all_tasks(env_instance=env, mode='rules')
          r2 = run_all_tasks(env_instance=env, mode='rules')
          for a, b in zip(r1, r2):
              assert a['score'] == b['score'], \
                  'Not reproducible: ' + a['task_id']
          print('Reproducibility OK:', [(r['task_id'], r['score']) for r in r1])
          PYEOF

  docker:
    name: Docker Build & E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t incident-response-triage:ci .

      - name: Start container
        run: |
          docker run -d \
            --name irt-test \
            -p 7860:7860 \
            incident-response-triage:ci
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7860/health > /dev/null 2>&1; then
              echo "Server up after ${i}s"; break
            fi
            sleep 1
          done

      - name: Verify health endpoint
        run: |
          STATUS=$(curl -sf http://localhost:7860/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
          test "$STATUS" = "ok" && echo "Health OK" || (echo "Health FAIL: $STATUS"; exit 1)

      - name: Verify tasks endpoint
        run: |
          COUNT=$(curl -sf http://localhost:7860/tasks | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          test "$COUNT" -ge 3 && echo "Tasks OK: $COUNT" || (echo "Tasks FAIL: $COUNT"; exit 1)

      - name: Run full episode against container
        run: |
          python3 << 'PYEOF'
          import httpx
          base = 'http://localhost:7860'
          r = httpx.post(base + '/reset', json={'task_id': 'severity_classification'})
          r.raise_for_status()
          sid = r.json()['session_id']
          headers = {'X-Session-ID': sid}
          r = httpx.post(base + '/step',
              json={'action_type': 'investigate', 'target': 'postgres-primary',
                    'parameters': {}, 'reasoning': 'check pool'},
              headers=headers)
          r.raise_for_status()
          r = httpx.post(base + '/step',
              json={'action_type': 'classify', 'target': '',
                    'parameters': {'severity': 'P2'}, 'reasoning': 'P2'},
              headers=headers)
          r.raise_for_status()
          assert r.json()['done'], 'Episode not done after classify'
          r = httpx.post(base + '/grader', headers=headers)
          r.raise_for_status()
          score = r.json()['score']
          assert score > 0.5, 'Score too low: ' + str(score)
          print('Docker E2E passed. Score:', score)
          PYEOF

      - name: Verify metrics endpoint
        run: |
          KEYS=$(curl -sf http://localhost:7860/metrics | python3 -c "import sys,json; print(list(json.load(sys.stdin).keys()))")
          echo "Metrics OK: $KEYS"

      - name: Verify Prometheus live metrics endpoint
        run: |
          python3 << 'PYEOF'
          import httpx
          base = 'http://localhost:7860'
          r = httpx.post(base + '/reset', json={'task_id': 'severity_classification'})
          sid = r.json()['session_id']
          headers = {'X-Session-ID': sid}
          r = httpx.get(base + '/prometheus/metrics', headers=headers)
          assert r.status_code == 200, 'Status: ' + str(r.status_code)
          assert '# HELP irt_error_rate' in r.text, 'Missing HELP line'
          assert 'irt_cpu_percent{' in r.text, 'Missing cpu_percent'
          print('Prometheus scrape OK')
          r = httpx.get(base + '/prometheus/query?query=irt_error_rate', headers=headers)
          data = r.json()
          assert data['status'] == 'success', 'Query failed'
          assert data['data']['resultType'] == 'vector'
          print('Prometheus query OK -', len(data['data']['result']), 'series')
          r2 = httpx.get(base + '/prometheus/query_range?query=irt_error_rate&start=0&end=9999999999', headers=headers)
          d2 = r2.json()
          assert d2['status'] == 'success', 'Range query failed: ' + str(r2.status_code)
          assert d2['data']['resultType'] == 'matrix', 'Expected matrix, got: ' + d2['data']['resultType']
          streams = d2['data']['result']
          assert len(streams) > 0, 'No streams in range query result'
          for stream in streams:
              assert 'values' in stream, 'Stream missing values key'
              assert len(stream['values']) >= 1, 'Stream has no values'
              ts, val = stream['values'][0]
              float(val)  # must be parseable
          print('Prometheus query_range OK -', len(streams), 'streams,', len(streams[0]['values']), 'samples')
          PYEOF

      - name: Stop container
        if: always()
        run: docker stop irt-test && docker rm irt-test

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install ruff pyyaml

      - name: Run ruff (linter)
        run: ruff check src/ baseline/ --select E,W,F --ignore E501
        continue-on-error: true

      - name: Check Python syntax
        run: |
          python -m py_compile src/environment.py
          python -m py_compile src/graders.py
          python -m py_compile src/rewards.py
          python -m py_compile src/scenarios.py
          python -m py_compile src/models.py
          python -m py_compile src/tasks.py
          python -m py_compile inference.py
          python -m py_compile app.py
          python -m py_compile validate.py
          echo "All files compile cleanly"

      - name: Verify openenv.yaml is valid YAML
        run: python -c "import yaml; yaml.safe_load(open('openenv.yaml')) or True; print('openenv.yaml OK')"

      - name: Verify Dockerfile has required instructions
        run: |
          grep -q "FROM python"  Dockerfile && echo "FROM: OK"
          grep -q "EXPOSE 7860"  Dockerfile && echo "EXPOSE: OK"
          grep -q "HEALTHCHECK"  Dockerfile && echo "HEALTHCHECK: OK"
          grep -q "CMD"          Dockerfile && echo "CMD: OK"
          grep -q "USER appuser" Dockerfile && echo "Non-root user: OK"
